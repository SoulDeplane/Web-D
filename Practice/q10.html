<!--
Problem: Design and implement a Student Feedback Form web page that clearly demonstrates the appropriate and practical use of inline, internal, and external CSS in a single HTML document.
The form must collect the following student details:
•	Student Name
•	Email Address
•	Course Selection (dropdown)
•	Feedback / Comments (multi-line input)
•	Submit option
Create a separate CSS file to define:
•	Common font style for the website
•	Page background color
•	Heading alignment and color
Use internal styling to define
•	Width and alignment of the form
•	Padding and spacing between form fields
•	Border radius and shadow for the form container
•	Label and input field alignment
Apply inline CSS to the Submit button to:
•	Use a bright background color
•	Change text color for emphasis
-->
<html>
    <head>
        <title>Feedback Form</title>
        <link href="a.css" rel="stylesheet">
    </head>
    <style>
        .m
        {
            background-color:rgb(56, 127, 171);
            margin:25px;
            padding:20px;
            color:white;
            border-radius:10%;
        }
        input, select, textarea
        {
            padding:10px;
            margin:10px;
        }
        label
        {
            size:10px;
        }
    </style>
    <body>
        <div class="m">
            <h1 align="center">Job Application Form</h1>
            <hr>
            <form>
                <br>
                <label>Student Name: </label>
                <input title="Student Name" placeholder="Enter Student Name..." type="text" required>
                <br><br>
                <label>Email Address: </label>
                <input title="Email Address" placeholder="Enter Email Address..." type="email" required>
                <br><br>
                <label>Course: </label>
                <select>
                    <option value="" disabled selected>Select Course...</option>
                    <option value="B.Tech">B.Tech</option>
                    <option value="M.Tech">M.Tech</option>
                    <option value="BBA">BBA</option>
                    <option value="BCA">BCA</option>
                </select>
                <br><br>
                <label>Feedback/Comments: </label>
                <input title="Feedback/Comments" placeholder="Enter Feedback/Comments..." type="textarea" rows="5" cols="10" required>
                <br><br>
                <center>
                    <input type="Submit" formaction="1.html" style="background-color:green; color:white">
                    <input type="Reset" style="background-color:red; color:white">
                </center>
            </form>
        </div>
    </body>
</html>
