<!--
Problem: Online Examination Registration & Confirmation System
An educational institution wants to develop a web-based online examination registration system for students. The system should interact with users using JavaScript window object methods to improve usability and confirmation.
When a student opens the registration page:
1.	Alert (alert ())
o	The system displays an alert message informing the student about important exam instructions.
2.	Prompt (prompt ())
o	The system asks the student to enter their name or registration number.
3.	Confirm (confirm ())
o	After entering details, the system asks the student to confirm submission of the registration form.
4.	Open (open ())
o	If the student clicks OK, a new window opens showing the exam guidelines or hall-ticket preview.
5.	Print (print ())
o	The student is given an option to print the registration confirmation or hall ticket.
6.	Close (close ())
o	After printing, the system automatically closes the hall-ticket preview window.
-->

        }
        function Prompt() {
            name = prompt("Enter your name:");
            ro = prompt("Enter your roll number:");
            if (!name || !ro) {
                alert("Registration cancelled or incomplete.");
                return;
            }
            let confirmRegister = confirm("Are you sure you want to register?");
            if (confirmRegister) {
                alert("Successfully registered!");
            } else {
                name = "";
                ro = "";
                alert("Registration cancelled.");
            }
        }
