<!--
Problem: Develop a simple calculator application that performs basic operations such as addition, subtraction, multiplication, division, power and modulus. The calculator should be implemented using HTML for structure, CSS for styling and layout, and JavaScript for functionality. The application must make use of JavaScript functions and object methods to handle user interactions and perform calculations dynamically.
-->
<html>
    <head>
        <title>Calculator</title>
    </head>
    <style>
        .m1{
            background-color: #824343;
            padding: 18px;
        }
        h1{
            color: #3f1919;
            font-size: 50px;
        }
        hr{
            border: 2px solid #0c0c0c;
        }
        .m2{
            background-color: #3f1919;
            height: 500px;
            text-align: center;
        }
        button{
            width: 40px;
            height: 40px;
            font-size: 20px;
            margin: 2px;
            background-color: #824343;
            color: #0c0c0c;
            border: 2px solid #474646;
            border-radius: 8px;
        }
        button:hover{
            background-color: #bfa7a7;
            color: #410808;
            border: 2px solid #474646;
        }
        input{
            background-color: #bfa7a7;
            color: #0c0c0c;
            border: 2px solid #474646;
            border-radius: 8px;
        }
    </style>
    <body>
        <div class="m1">
            <h1 align="center">Calculator</h1>
        </div>
        <hr>
        <div class="m2">
            <br><br><br>
            <button onclick="one()">1</button>
            <button onclick="two()">2</button>
            <button onclick="three()">3</button>
            <button onclick="div()">/</button>
            <br>
            <button onclick="four()">4</button>
            <button onclick="five()">5</button>
            <button onclick="six()">6</button>
            <button onclick="mul()">*</button>
            <br>
            <button onclick="seven()">7</button>
            <button onclick="eight()">8</button>
            <button onclick="nine()">9</button>
            <button onclick="minus()">-</button>
            <br>
            <button onclick="zero()">0</button>
            <button onclick="power()">**</button>
            <button onclick="equal()">=</button>
            <button onclick="plus()">+</button>
            <br>
            <button onclick="clea()">AC</button>
            <input type="text" id="display" disabled style="width: 140px; height: 40px; font-size: 20px; margin-top: 2px;">
        </div>
    </body>
    <script>
        function clea(){
            document.getElementById("display").value = "";
        }
        function nine(){
            document.getElementById("display").value += "9";
        }
        function eight(){
            document.getElementById("display").value += "8";
        }
        function seven(){
            document.getElementById("display").value += "7";
        }
        function six(){
            document.getElementById("display").value += "6";
        }
        function five(){
            document.getElementById("display").value += "5";
        }
        function four(){
            document.getElementById("display").value += "4";
        }
        function three(){
            document.getElementById("display").value += "3";
        }
        function two(){
            document.getElementById("display").value += "2";
        }
        function one(){
            document.getElementById("display").value += "1";
        }
        function zero(){
            document.getElementById("display").value += "0";
        }
        function plus(){
            document.getElementById("display").value += "+";
        }
        function minus(){
            document.getElementById("display").value += "-";
        }
        function mul(){
            document.getElementById("display").value += "*";
        }
        function div(){
            document.getElementById("display").value += "/";
        }
        function power(){
            document.getElementById("display").value += "**";
        }
        function equal()
        {
            var d=document.getElementById("display").value;
            try
            {
                var r=eval(d);
                document.getElementById("display").value=r;
            }
            catch(error)
            {
                document.getElementById("display").value="Error";
            }
        }

    </script>
</html>
