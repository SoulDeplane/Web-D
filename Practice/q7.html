<!--
Problem: Design an Online Job Application Form that collects job applications online through a web form. Applicants must provide personal and professional details with proper validation.
o	Accepts Applicant Full Name (mandatory, min 4 characters)
o	Accepts Email Address (mandatory, valid format)
o	Accepts Mobile Number (must be exactly 10 digits using pattern)
o	Accepts Years of Experience (numeric, 0 to 30, step of 1)
o	Allows selection of Job Role from a dropdown
o	Allows selection of Technical Skills using checkboxes
o	Accepts Cover Letter using a textarea
o	Includes Submit Application button
o	Performs validation using required, minlength, maxlength, min, max, step, pattern, type
-->
<html>
    <head>
        <title>Job Application Form</title>
    </head>
    <body>
        <div style="background-color:rgb(56, 127, 171); margin:25px; padding:20px">
            <h1 align="center">Job Application Form</h1>
            <form>
                <label>Full Name: </label>
                <input type="text" required minlength="4px" placeholder="Enter Full Name...">
                <br><br>
                <label>Email Address: </label>
                <input type="email" required placeholder="Enter Email Address...">
                <br><br>
                <label>Mobile Nummber: </label>
                <input type="text" required pattern="[0-9]{10}">
                <br><br>
                <label>Years of Experience: </label>
                <input type="number" min="0" max="30" placeholder="Enter YOE..." required>
                <br><br>
                <label>Job Role: </label>
                <select>
                    <option value="" disabled selected>Select Job Role</option>
                    <option value="developer">Developer</option>
                    <option value="designer">Designer</option>
                    <option value="manager">Manager</option>
                    <option value="tester">Tester</option>
                </select>
                <br><br>
                <label>Technical Skills: </label>
                <select>
                    <option value="" disabled selected>Select Technical Skill</option>
                    <option value="C++">C++</option>
                    <option value="Python">Python</option>
                    <option value="Java">Java</option>
                    <option value="Rust">Rust</option>
                </select>
                <br><br>
                <label>Cover Letter: </label>
                <input type="textarea" rows="100" cols="50" title="Cover Letter" placeholder="Enter Cover Letter" required>
                <br><br>
                <center>
                    <input type="Submit" formaction="1.html" style="background-color:green">
                    <input type="Reset" style="background-color:red">
                </center>
            </form>
        </div>
    </body>
</html>
