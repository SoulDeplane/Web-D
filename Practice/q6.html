<!--
Problem: Design a Student Course Registration Form that allow students to register for a course online. The form should collect student details and validate the input before submission.
o	Accepts Student Name (mandatory, 3–30 characters)
o	Accepts University Email ID (mandatory, valid email format)
o	Accepts USN / Roll Number (pattern: 2 uppercase letters + 2 digits + 3 uppercase letters)
o	Allows selection of Course from a dropdown list
o	Accepts Age (must be between 18 and 30)
o	Allows selection of Gender using radio buttons
o	Includes Submit and Reset buttons
o	Uses only HTML form validation attributes (no JavaScript)
o	Provide a good background color for page with college logo and running text which displays college name and address.
-->
<html>
    <head>
        <title>Student Course Registration</title>
    </head>
    <body bgcolor="#d12345" style="color:white">
        <br>
        <Center>
            <img src="https://imgs.search.brave.com/JH89w4f3hARZnIeKKG_X5RipKrKAen7YQCOvfw0oASo/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly93d3cu/YWRtaXNzaW9uaW5k/aWEubmV0L3VwbG9h/ZHMvY29sbGVnZXMv/Ny9nZXUlMjBsZ28u/anBn" style="border-radius:50%" title="Graphic Era (Deemed To Be) University" alt="Graphic Era (Deemed To Be) University" height="150px">
        </Center>
        <h2 align="center">
            <marquee>Graphic Era (Deemed To Be) University</marquee>
            <marquee direction="right">Bell Road, Subhash Nagar, Clement Town, Dehradun</marquee>
        </h2>
        <hr>
        <h1 align="center">Student Course Registeration</h1>
        <hr>
        <div style="background-color:#5c3030">
            <form style="margin-left:20px">
                <br>
                <label>Student Name:</label>&nbsp;
                <input type="text" title="Student Name" placeholder="Enter Student Name..." minlength="3" maxlength="20" required>
                <br><br>
                <label>University Email id: </label>&nbsp;
                <input type="email" title="University Email Id" placeholder="Enter University Email Id..." required>
                <br><br>
                <label>Roll No.: </label>&nbsp;
                <input type="text" title="Roll No. (2 uppercase letters + 2digits + 3 uppercase letters)" placeholder="Enter Roll No..." required pattern="[A-Z]{2}[0-9]{2}[A-Z]{3}">
                <br><br>
                <label>Course: </label>&nbsp;
                <select required>
                    <option value="" disabled selected>Select Course...</option>
                    <option value="B.Tech">B.Tech</option>
                    <option value="M.Tech">M.Tech</option>
                    <option value="BCA">BCA</option>
                    <option value="BBA">BBA</option>
                </select>
                <br><br>
                <label>Age: </label>&nbsp;
                <input type="number" title="Enter Age" placeholder="Enter Age..." required min="18" max="30">
                <br><br>
                <label>Gender: </label>&nbsp;
                <input type="radio" name="gender" value="Male"> Male
                <input type="radio" name="gender" value="Female"> Female
                <br><br>
                <center>
                    <input type="Submit"formaction="1.html" style="background-color:Green">&nbsp;&nbsp;
                    <input type="Reset" style="background-color:Red">
                </center>
                <br>
            </form>
        </div>
    </body>
</html>
