<html>

<head>
    <title>
        Student Course Registration Form
    </title>
</head>
<style>
    h1 {
        font-size: 50px;
        text-align: center;
    }

    .m1 {
        border: 2px solid rgb(253, 248, 248);
        padding: 20px;
        background-color: rgb(4, 26, 67);
        text-align: center;
        color: white;
    }

    .m4 {
        color: red;
        font-size: 20px;
        background-color: rgb(238, 225, 192);
        padding: 10px;
    }

    .m2 {
        border: 2px solid rgb(253, 248, 248);
        padding: 20px;
        background-color: rgb(67, 127, 238);
        font-size: 25px;
        width: 85%;
    }

    .m3 {
        border: 2px solid rgb(253, 248, 248);
        padding: 20px;
        background-color: rgb(4, 26, 67);
        text-align: center;
    }

    .m5 {
        padding: 20px;
        align-content: center;
        width: 15%
    }

    .m6 {
        display: flex;
    }

    input[type="text"] {
        height: 30px;
    }

    input[type="email"] {
        height: 30px;
    }

    input[type="radio"] {
        width: 20px;
        height: 20px;
    }

    select {
        width: 200px;
        height: 30px;
    }
</style>

<body>
    <div class="m1">
        <h1>
            Student Course Registration
        </h1>
    </div>
    <hr>
    <div class="m4">
        <marquee behavior="alternate" direction="right">
            Graphic Era (Deemed To Be) University
        </marquee>
    </div>
    <hr>

    <form>
        <div class="m6">
            <div class="m2">

                Student Name:
                <input type="text" name="studentName" required pattern="[a-zA-Z][a-zA-Z ]+" title="Enter valid name"
                    minlength="3" maxlength="30">
                <br><br>

                University Email ID:
                <input type="email" name="email" required>
                <br><br>

                Roll Number:
                <input type="text" name="roll" required pattern="[A-Z]{2}[0-9]{2}[A-Z]{3}" title="Format: 2 uppercase letters, 2 digits, 3 uppercase letters">
                <br><br>

                Course:
                <select name="course" required>
                    <option value="">--Select Course--</option>
                    <option value="B.Tech">B.Tech</option>
                    <option value="M.Tech">M.Tech</option>
                    <option value="PhD">PhD</option>
                </select>
                <br><br>

                Age:
                <input type="number" name="age" required min="18" max="30">
                <br><br>

                Gender:
                <input type="radio" name="gender" value="male" required> Male
                <input type="radio" name="gender" value="female"> Female
                <br><br>

            </div>

            <div class="m5">
                <img src="https://imgs.search.brave.com/JH89w4f3hARZnIeKKG_X5RipKrKAen7YQCOvfw0oASo/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly93d3cu/YWRtaXNzaW9uaW5k/aWEubmV0L3VwbG9h/ZHMvY29sbGVnZXMv/Ny9nZXUlMjBsZ28u/anBn"
                    title="Graphic Era (Deemed To Be) University" alt="Graphic Era (Deemed To Be) University">
            </div>
        </div>

        <hr>

        <div class="m3">
            <input type="submit" style="font-size: 25px; color: rgb(244, 245, 244); background-color: green;">
            &nbsp;&nbsp;
            <input type="reset" style="font-size: 25px; color: rgb(244, 245, 244); background-color: red;">
        </div>
    </form>

</body>

</html>
